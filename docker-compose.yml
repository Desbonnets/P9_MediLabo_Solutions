services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: medilabo
      POSTGRES_USER: medilabo
      POSTGRES_PASSWORD: medilabopass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U medilabo -d medilabo" ]
      interval: 5s
      timeout: 5s
      retries: 5

  back:
    build: ./back
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/medilabo
      SPRING_DATASOURCE_USERNAME: medilabo
      SPRING_DATASOURCE_PASSWORD: medilabopass
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./gateway
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      - back

  front:
    build:
      context: ./front
      target: dev
    volumes:
      - ./front:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - gateway

volumes:
  postgres_data:
