services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  back:
    build: ./back
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8081:8081"
    depends_on:
      - mongo

  gateway:
    build: ./gateway
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      - back
